<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f5f5f7">
  <meta name="description" content="ビデオ喉頭鏡（AWS）追加講習・運用試験 事前学習プレテストの虫食い暗記アプリ">
  <title>ビデオ喉頭鏡プレテスト｜虫食い暗記</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="hero">
    <h1 class="hero__title">ビデオ喉頭鏡プレテスト</h1>
    <p class="hero__subtitle">虫食い暗記 ・ 全63問</p>
  </header>

  <div class="toolbar" id="toolbar">
    <div class="segmented" role="tablist" aria-label="難易度">
      <span class="segmented__thumb" aria-hidden="true"></span>
      <button class="segmented__item is-active" data-level="1" role="tab" aria-selected="true">初級</button>
      <button class="segmented__item" data-level="2" role="tab" aria-selected="false">中級</button>
      <button class="segmented__item" data-level="3" role="tab" aria-selected="false">上級</button>
    </div>
    <button class="btn btn--reveal" id="revealToggle" type="button" aria-pressed="false">答えを表示</button>
  </div>

  <main class="list" id="list" aria-live="polite"></main>

  <footer class="foot">
    <p class="foot__hint">グレーの部分をタップすると答えが出ます。もう一度タップで隠せます。</p>
    <p class="foot__src">
      記載ページ：へるす出版「ビデオ喉頭鏡（エアウェイスコープ）気管挿管のポイントとトラブル対策」／救急救命士標準テキスト 第10版。<br>
      「プロトコール」＝愛知県救急隊心肺蘇生法プロトコール（令和3年10月11日 一部改正）。ビデオ喉頭鏡はAWSについての問とする。
    </p>
  </footer>

  <script src="questions.js"></script>
  <script src="app.js"></script>
</body>
</html>
